version: 0.0.1
publish_to: none
repository: https://github.com/Lukas-io/glint
homepage: https://github.com/Lukas-io/glint
topics:
  - mcp
  - flutter
  - agents
  - automation
  - simulator

environment:
  sdk: ^3.5.0

executables:
  glint:

dependencies:
  args: ^2.5.0
  crypto: ^3.0.0
  dart_mcp: ^0.5.1
  dtd: ^4.0.0
  path: ^1.9.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
